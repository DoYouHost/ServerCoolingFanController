---
# Display layout preview using SDL (host platform)
# Run: esphome run display_preview.yaml
# Requires: apt install libsdl2-dev libsodium-dev (Linux)
#           brew install sdl2 libsodium (macOS)

esphome:
  name: display-preview
  friendly_name: "Display Preview"

host:

globals:
  - id: g_rpm1
    type: int
    initial_value: "2450"
  - id: g_rpm2
    type: int
    initial_value: "2380"
  - id: g_rpm3
    type: int
    initial_value: "2410"
  - id: g_rpm4
    type: int
    initial_value: "2390"
  - id: g_t1
    type: float
    initial_value: "32.5"
  - id: g_t2
    type: float
    initial_value: "34.1"
  - id: g_ema
    type: float
    initial_value: "33.2"
  - id: g_pwm
    type: int
    initial_value: "65"

display:
  - platform: sdl
    id: my_display
    dimensions:
      width: 284
      height: 76
    window_options:
      resizable: true
    auto_clear_enabled: false
    update_interval: never

font:
  - file: "gfonts://Source Code Pro"
    id: font_large
    size: 18
    bpp: 4
  - file: "gfonts://Source Code Pro"
    id: font_medium
    size: 14
    bpp: 4
  - file: "gfonts://Source Code Pro"
    id: font_small
    size: 11
    bpp: 4
image:
  - file: "images/fan_anim/fan_00.png"
    id: fan_frame_00
    type: RGB565
    transparency: alpha_channel
  - file: "images/fan_anim/fan_01.png"
    id: fan_frame_01
    type: RGB565
    transparency: alpha_channel
  - file: "images/fan_anim/fan_02.png"
    id: fan_frame_02
    type: RGB565
    transparency: alpha_channel
  - file: "images/fan_anim/fan_03.png"
    id: fan_frame_03
    type: RGB565
    transparency: alpha_channel
  - file: "images/fan_anim/fan_04.png"
    id: fan_frame_04
    type: RGB565
    transparency: alpha_channel
  - file: "images/fan_anim/fan_05.png"
    id: fan_frame_05
    type: RGB565
    transparency: alpha_channel
  - file: "images/fan_anim/fan_06.png"
    id: fan_frame_06
    type: RGB565
    transparency: alpha_channel
  - file: "images/fan_anim/fan_07.png"
    id: fan_frame_07
    type: RGB565
    transparency: alpha_channel
  - file: "images/fan_anim/fan_08.png"
    id: fan_frame_08
    type: RGB565
    transparency: alpha_channel
  - file: "images/fan_anim/fan_09.png"
    id: fan_frame_09
    type: RGB565
    transparency: alpha_channel
  - file: "images/fan_anim/fan_10.png"
    id: fan_frame_10
    type: RGB565
    transparency: alpha_channel
  - file: "images/fan_anim/fan_11.png"
    id: fan_frame_11
    type: RGB565
    transparency: alpha_channel

color:
  - id: color_bg
    hex: "1A1A2E"
  - id: color_panel
    hex: "16213E"
  - id: color_primary
    hex: "0F3460"
  - id: color_accent
    hex: "00AAFF"
  - id: color_ok
    hex: "00CC66"
  - id: color_warn
    hex: "FFAA00"
  - id: color_error
    hex: "FF4444"
  - id: color_text
    hex: "E0E0E0"
  - id: color_text_dim
    hex: "808080"

lvgl:
  displays:
    - my_display
  color_depth: 16
  buffer_size: 100%
  disp_bg_color: color_bg
  default_font: font_small

  style_definitions:
    - id: style_panel
      bg_color: color_panel
      radius: 4
      pad_all: 3
      border_width: 0

    - id: style_bar_bg
      bg_color: color_primary
      radius: 2

    - id: style_bar_ok
      bg_color: color_ok
      radius: 2

    - id: style_bar_warn
      bg_color: color_warn
      radius: 2

  pages:
    # ── Normal page ──────────────────────────────────────────────
    - id: normal_page
      bg_color: color_bg
      layout:
        type: FLEX
        flex_flow: ROW
        pad_column: 3
      pad_all: 3
      widgets:
        # Left panel: Fan icon + PWM
        - obj:
            styles: style_panel
            width: 72
            height: 70
            scrollbar_mode: "OFF"
            layout:
              type: FLEX
              flex_flow: COLUMN
              flex_align_main: CENTER
              flex_align_cross: CENTER
              pad_row: 0
            widgets:
              - animimg:
                  id: fan_anim
                  src:
                    - fan_frame_00
                    - fan_frame_01
                    - fan_frame_02
                    - fan_frame_03
                    - fan_frame_04
                    - fan_frame_05
                    - fan_frame_06
                    - fan_frame_07
                    - fan_frame_08
                    - fan_frame_09
                    - fan_frame_10
                    - fan_frame_11
                  duration: 1000ms
                  auto_start: true
                  repeat_count: forever
              - label:
                  id: lbl_pwm
                  text: "65%"
                  text_font: font_medium
                  text_color: color_accent
              - bar:
                  id: pwm_bar
                  width: 64
                  height: 4
                  value: 65
                  min_value: 0
                  max_value: 100
                  styles: style_bar_bg
                  indicator:
                    styles: style_bar_ok

        # Center panel: Fan RPMs
        - obj:
            styles: style_panel
            width: 105
            height: 70
            layout:
              type: FLEX
              flex_flow: COLUMN
              pad_row: 1
            widgets:
              - label:
                  id: lbl_fan1
                  text: "F1: 2450 rpm"
                  text_font: font_small
                  text_color: color_text
              - label:
                  id: lbl_fan2
                  text: "F2: 2380 rpm"
                  text_font: font_small
                  text_color: color_text
              - label:
                  id: lbl_fan3
                  text: "F3: 2410 rpm"
                  text_font: font_small
                  text_color: color_text
              - label:
                  id: lbl_fan4
                  text: "F4: 2390 rpm"
                  text_font: font_small
                  text_color: color_text

        # Right panel: Temps + EMA + Status
        - obj:
            styles: style_panel
            width: 95
            height: 70
            layout:
              type: FLEX
              flex_flow: COLUMN
              pad_row: 0
            widgets:
              - label:
                  id: lbl_t1
                  text: "T1: 32.5°C"
                  text_font: font_small
                  text_color: color_text
              - label:
                  id: lbl_t2
                  text: "T2: 34.1°C"
                  text_font: font_small
                  text_color: color_text
              - label:
                  id: lbl_ema
                  text: "EMA 33.2°C"
                  text_font: font_small
                  text_color: color_accent
              - label:
                  text: "AUTO"
                  text_font: font_small
                  text_color: color_ok

    # ── Error page ───────────────────────────────────────────────
    - id: error_page
      bg_color: color_bg
      pad_all: 3
      layout:
        type: FLEX
        flex_flow: COLUMN
        pad_row: 2
      widgets:
        - label:
            text: "FAN ERROR!"
            text_font: font_large
            text_color: color_error
        - label:
            text: "Rack Fan 1 FAIL"
            text_font: font_medium
            text_color: color_error
        - label:
            text: "Rack Fan 3 FAIL"
            text_font: font_medium
            text_color: color_warn

interval:
  # Simulate live sensor data
  - interval: 2s
    then:
      - lambda: |-
          // Fan RPM drift ±20 (2200-2600 range)
          id(g_rpm1) += (rand() % 41) - 20;
          id(g_rpm2) += (rand() % 41) - 20;
          id(g_rpm3) += (rand() % 41) - 20;
          id(g_rpm4) += (rand() % 41) - 20;
          id(g_rpm1) = clamp(id(g_rpm1), 2200, 2600);
          id(g_rpm2) = clamp(id(g_rpm2), 2200, 2600);
          id(g_rpm3) = clamp(id(g_rpm3), 2200, 2600);
          id(g_rpm4) = clamp(id(g_rpm4), 2200, 2600);
          // Temperature drift ±0.5 (30-40°C range)
          id(g_t1) += ((rand() % 100) - 50) / 100.0f;
          id(g_t2) += ((rand() % 100) - 50) / 100.0f;
          id(g_t1) = clamp(id(g_t1), 30.0f, 40.0f);
          id(g_t2) = clamp(id(g_t2), 30.0f, 40.0f);
          // EMA = average of both sensors
          id(g_ema) = (id(g_t1) + id(g_t2)) / 2.0f;
          // PWM from EMA: 30°C→30%, 40°C→100%
          id(g_pwm) = clamp((int)((id(g_ema) - 30.0f) * 7.0f + 30.0f), 30, 100);
      - lvgl.label.update:
          id: lbl_fan1
          text:
            format: "F1: %d rpm"
            args: ['id(g_rpm1)']
      - lvgl.label.update:
          id: lbl_fan2
          text:
            format: "F2: %d rpm"
            args: ['id(g_rpm2)']
      - lvgl.label.update:
          id: lbl_fan3
          text:
            format: "F3: %d rpm"
            args: ['id(g_rpm3)']
      - lvgl.label.update:
          id: lbl_fan4
          text:
            format: "F4: %d rpm"
            args: ['id(g_rpm4)']
      - lvgl.label.update:
          id: lbl_pwm
          text:
            format: "%d%%"
            args: ['id(g_pwm)']
      - lvgl.bar.update:
          id: pwm_bar
          value: !lambda return id(g_pwm);
      - lvgl.label.update:
          id: lbl_t1
          text:
            format: "T1: %.1f°C"
            args: ['id(g_t1)']
      - lvgl.label.update:
          id: lbl_t2
          text:
            format: "T2: %.1f°C"
            args: ['id(g_t2)']
      - lvgl.label.update:
          id: lbl_ema
          text:
            format: "EMA %.1f°C"
            args: ['id(g_ema)']
